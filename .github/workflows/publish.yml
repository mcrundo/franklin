name: Publish to PyPI

on:
  release:
    types: [published]

# Trusted publishing (OIDC) requires id-token: write. No PyPI API token
# is stored in repo secrets — PyPI verifies the OIDC claim against the
# trusted publisher configured at
# https://pypi.org/manage/project/franklin-book/settings/publishing/
# See https://docs.pypi.org/trusted-publishers/ for setup.

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          uv run --with twine twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Using a named environment lets you add required reviewers on the
    # PyPI publish step in the repo's environment settings if you want
    # a manual gate before the upload actually happens.
    environment:
      name: pypi
      url: https://pypi.org/project/franklin-book/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

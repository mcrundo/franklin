name: Release

# Tag-triggered release: when bin/release pushes a v*.*.* tag, this
# workflow verifies the tag matches pyproject.toml, extracts the
# matching CHANGELOG section, and creates a GitHub Release. Creating
# the release fires publish.yml (PyPI upload) and homebrew-bump.yml
# (tap PR) automatically.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history so the changelog file is present and
          # we can compare against prior tags if we want to.
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml matches tag
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          PYPROJECT_VERSION="$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)"
          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match pyproject.toml version $PYPROJECT_VERSION"
            echo "::error::Run bin/release to bump correctly, or fix pyproject.toml and re-tag."
            exit 1
          fi

      - name: Verify __init__.py matches tag
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          INIT_VERSION="$(grep '^__version__ = ' src/franklin/__init__.py | head -1 | cut -d'"' -f2)"
          if [[ "$TAG_VERSION" != "$INIT_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match __init__.py __version__ = $INIT_VERSION"
            exit 1
          fi

      - name: Extract CHANGELOG section for this version
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$(mktemp)"
          # Capture lines from the matching "## [VERSION]" heading until
          # the next "## [" heading (exclusive). bin/release inserts
          # exactly one such heading, so this is unambiguous.
          awk -v v="$VERSION" '
            BEGIN { found = 0; printing = 0 }
            /^## \[/ {
              if (printing) { printing = 0; exit }
              if ($0 ~ "^## \\[" v "\\]") { found = 1; printing = 1; next }
            }
            printing { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "::error::No CHANGELOG.md section found for [$VERSION]."
            echo "::error::Did bin/release run? Or did you tag without updating the changelog?"
            exit 1
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "--- extracted notes ---"
          cat "$NOTES_FILE"
          echo "--- end notes ---"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "${{ steps.notes.outputs.notes_file }}"
